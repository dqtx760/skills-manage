<!DOCTYPE html>
<html>
<head>
<style>
body {
  width: 720pt;
  height: 405pt;
  margin:0;
  padding: 40pt;
  display: flex;
  flex-direction: column;
  background: #F4F6F6;
  font-family: Arial, Helvetica, sans-serif;
}
.header {
  font-size: 32pt;
  font-weight: bold;
  color: #1C2833;
  margin-bottom: 30pt;
  border-left: 8pt solid #277884;
  padding-left: 20pt;
}
.columns {
  display: flex;
  gap: 40pt;
}
.col {
  flex:1;
}
.col h3 {
  font-size: 20pt;
  font-weight: bold;
  color: #277884;
  margin-bottom: 15pt;
}
ul {
  margin:0;
  padding-left: 25pt;
}
li {
  font-size: 16pt;
  color: #2E4053;
  margin: 10pt 0;
  line-height: 1.5;
}
.code {
  background: #2E4053;
  color: #AAB7B8;
  padding: 10pt;
  font-family: 'Courier New', monospace;
  font-size: 14pt;
  margin: 10pt 0;
  border-radius: 4pt;
}
</style>
</head>
<body>
<div class="header">GitHub 同步流程</div>
<div class="columns">
<div class="col">
<h3>📤 推送到 GitHub</h3>
<ul>
<li>方式1：双击运行 push.bat</li>
<li>方式2：手动 git 命令</li>
</ul>
<div class="code">cd .skillshub<br>git add .<br>git commit -m "description"<br>git push</div>
</div>
<div class="col">
<h3>📥 从 GitHub 同步</h3>
<ul>
<li>重新克隆或 git pull</li>
<li>多端同步：台式机 push → 笔记本 pull</li>
<li>只在本机使用无需推送</li>
</ul>
<div class="code">cd .skillshub<br>git pull</div>
</div>
</div>
</body>
</html>
